name: Project Automation

# Keeps the "Lernza Roadmap" project board in sync with issue/PR lifecycle.
# The board tracks ISSUES only — PRs are never added to the board.
# PRs move their linked issues through statuses via this workflow.
# Zero manual steps — everything is fully event-driven.
#
# Statuses: Backlog → In Progress → In Review → Done / Invalid
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  Built-in project workflows (configured in project settings UI):   │
# │                                                                    │
# │  ✅ Auto-add to project    filter: is:issue is:open                │
# │  ✅ Item added to project  issue only → Backlog                    │
# │  ✅ Item closed            issue only → Done                       │
# │  ✅ Item reopened          issue only → Backlog                    │
# │  ✅ Auto-close issue       when status = Done → closes issue       │
# │  ❌ PR linked to issue     OFF (linking ≠ ready for review)        │
# │  ❌ PR merged              OFF (operates on PR, not linked issue)  │
# │  ❌ Code changes requested OFF (operates on PR, not linked issue)  │
# │  ❌ Code review approved   OFF (operates on PR, not linked issue)  │
# │                                                                    │
# │  This Actions workflow handles everything else:                    │
# │                                                                    │
# │  Issue assigned            → In Progress (only from Backlog)       │
# │  Issue unassigned (none)   → Backlog (only from In Progress)       │
# │  Issue closed not_planned  → Invalid (overrides built-in Done)     │
# │  Review requested on PR    → linked issues to In Review            │
# │  PR converted to draft     → linked issues to In Progress          │
# │  Changes requested review  → linked issues to In Progress          │
# │  PR closed without merge   → In Progress (assigned) / Backlog     │
# │                                                                    │
# │  PR merged → Done is handled by the indirect chain:                │
# │  merge → GitHub auto-closes linked issue → built-in Item closed    │
# │                                                                    │
# │  Issue linking uses GitHub's closingIssuesReferences GraphQL API   │
# │  with regex fallback — catches sidebar links, not just body text.  │
# └─────────────────────────────────────────────────────────────────────┘

on:
  issues:
    types: [assigned, unassigned, closed]
  # Use pull_request_target (not pull_request) so fork PRs have access
  # to PROJECT_TOKEN. Safe because we never checkout PR code.
  pull_request_target:
    types: [closed, review_requested, converted_to_draft]
  pull_request_review:
    types: [submitted]

env:
  GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  PROJECT_OWNER: lernza
  PROJECT_NUMBER: "1"
  STATUS_FIELD_ID: "PVTSSF_lADOC20SDc4BRpIZzg_aUc4"
  PROJECT_ID: "PVT_kwDOC20SDc4BRpIZ"
  STATUS_BACKLOG: "9ee49bec"
  STATUS_IN_PROGRESS: "2f115854"
  STATUS_IN_REVIEW: "cb65cf8c"
  STATUS_DONE: "9e0f6df4"
  STATUS_INVALID: "c099a7e2"

jobs:
  # ─── Issue assigned → In Progress ──────────────────────────────
  # Only moves from Backlog. Does NOT yank issues backwards from
  # In Review, Done, or Invalid.
  issue-assigned:
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move to In Progress if in Backlog
        run: |
          # Ensure issue is in project
          ITEM_ID=$(gh project item-add $PROJECT_NUMBER \
            --owner $PROJECT_OWNER \
            --url "${{ github.event.issue.html_url }}" \
            --format json | jq -r '.id')

          CURRENT_STATUS=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | .status')

          if [ "$CURRENT_STATUS" = "Backlog" ] || \
             [ "$CURRENT_STATUS" = "" ] || \
             [ "$CURRENT_STATUS" = "null" ]; then

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #${{ github.event.issue.number }} → In Progress (was: ${CURRENT_STATUS:-empty})"
          else
            echo "· #${{ github.event.issue.number }} already $CURRENT_STATUS, skipped"
          fi

  # ─── Issue unassigned → Backlog (if no assignees left) ─────────
  # Only moves from In Progress. Does NOT move issues that are
  # In Review (PR still open), Done, or Invalid.
  issue-unassigned:
    if: github.event_name == 'issues' && github.event.action == 'unassigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move back to Backlog if no assignees and currently In Progress
        run: |
          ASSIGNEE_COUNT=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json assignees -q '.assignees | length')

          if [ "$ASSIGNEE_COUNT" -gt 0 ]; then
            echo "· #${{ github.event.issue.number }} still has $ASSIGNEE_COUNT assignee(s), no change"
            exit 0
          fi

          ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

          ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
          CURRENT_STATUS=$(echo "$ITEM_DATA" | cut -d' ' -f2-)

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "· #${{ github.event.issue.number }} not in project, skipped"
            exit 0
          fi

          if [ "$CURRENT_STATUS" = "In Progress" ]; then
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_BACKLOG\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #${{ github.event.issue.number }} → Backlog (unassigned)"
          else
            echo "· #${{ github.event.issue.number }} is $CURRENT_STATUS, not In Progress, skipped"
          fi

  # ─── Issue closed as "not planned" → Invalid ───────────────────
  # The built-in "Item closed" sets Done for all closes.
  # This overrides that for issues closed as "not planned".
  issue-closed-not-planned:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'closed' &&
      github.event.issue.state_reason == 'not_planned'
    runs-on: ubuntu-latest
    steps:
      - name: Override to Invalid
        run: |
          # Runner startup (~15-30s) gives built-in time to set Done first.
          sleep 3

          ITEM_ID=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | .id')

          if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_INVALID\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #${{ github.event.issue.number }} → Invalid (closed as not planned)"
          fi

  # ─── Review requested on PR → linked issues to In Review ──────
  # Fires when a contributor clicks "Request review" — meaning they
  # consider the work done. Draft PRs or just opening a PR does NOT
  # trigger this.
  review-requested:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'review_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Use GitHub's closingIssuesReferences API (catches sidebar links
          # AND body keywords). Fall back to regex if API returns nothing.
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              } 
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          # Fallback to regex if API returned nothing
          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          if [ -z "$ISSUE_NUMS" ]; then
            echo "· PR #$PR_NUM has no linked issues"
            exit 0
          fi

          for NUM in $ISSUE_NUMS; do
            ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
            CURRENT_STATUS=$(echo "$ITEM_DATA" | cut -d' ' -f2-)

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              continue
            fi

            # Don't override terminal states
            if [ "$CURRENT_STATUS" = "Done" ] || [ "$CURRENT_STATUS" = "Invalid" ]; then
              echo "· #$NUM is $CURRENT_STATUS, skipped"
              continue
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_IN_REVIEW\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #$NUM → In Review (review requested on PR #$PR_NUM)"
          done

  # ─── PR converted to draft → linked issues back to In Progress ─
  # Contributor realizes PR isn't ready and converts to draft.
  # Issue should go back to In Progress (they're still working).
  converted-to-draft:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'converted_to_draft'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues back to In Progress
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          if [ -z "$ISSUE_NUMS" ]; then
            echo "· PR #$PR_NUM has no linked issues"
            exit 0
          fi

          for NUM in $ISSUE_NUMS; do
            ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
            CURRENT_STATUS=$(echo "$ITEM_DATA" | cut -d' ' -f2-)

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              continue
            fi

            # Only move from In Review back to In Progress
            if [ "$CURRENT_STATUS" = "In Review" ]; then
              gh api graphql -f query="
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: \"$PROJECT_ID\"
                    itemId: \"$ITEM_ID\"
                    fieldId: \"$STATUS_FIELD_ID\"
                    value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
                  }) { projectV2Item { id } }
                }"
              echo "✓ #$NUM → In Progress (PR #$PR_NUM converted to draft)"
            else
              echo "· #$NUM is $CURRENT_STATUS, not In Review, skipped"
            fi
          done

  # ─── Changes requested on review → linked issues to In Progress ─
  # Only moves if no OTHER open PR for the same issue is still in a
  # review-requested state. Prevents bouncing issues when multiple
  # contributors work on competing approaches.
  changes-requested:
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Progress if no other PRs in review
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          if [ -z "$ISSUE_NUMS" ]; then
            echo "· PR #$PR_NUM has no linked issues"
            exit 0
          fi

          for NUM in $ISSUE_NUMS; do
            ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
            CURRENT_STATUS=$(echo "$ITEM_DATA" | cut -d' ' -f2-)

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              continue
            fi

            if [ "$CURRENT_STATUS" != "In Review" ]; then
              echo "· #$NUM is $CURRENT_STATUS, not In Review, skipped"
              continue
            fi

            # Check if OTHER open PRs also link to this issue
            OTHER_PRS=$(gh pr list --repo "$REPO" --state open \
              --json number,body -q \
              "[.[] | select(.number != $PR_NUM) | select(.body | test(\"(?i)(close[sd]?|fix(e[sd])?|resolve[sd]?)\\\\s+#$NUM\"))] | length" 2>/dev/null || echo "0")

            if [ "$OTHER_PRS" -gt 0 ] 2>/dev/null; then
              echo "· #$NUM has $OTHER_PRS other open PR(s), staying In Review"
              continue
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #$NUM → In Progress (changes requested on PR #$PR_NUM)"
          done

  # ─── PR closed without merge → In Progress or Backlog ──────────
  # Checks for OTHER open PRs linked to the same issue first.
  # If another PR is still open, the issue stays In Review.
  # Otherwise: In Progress if assigned, Backlog if not.
  pr-closed-not-merged:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues based on remaining PRs and assignment
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          if [ -z "$ISSUE_NUMS" ]; then
            echo "· PR #$PR_NUM has no linked issues"
            exit 0
          fi

          for NUM in $ISSUE_NUMS; do
            ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
            CURRENT_STATUS=$(echo "$ITEM_DATA" | cut -d' ' -f2-)

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              continue
            fi

            # Don't touch terminal states
            if [ "$CURRENT_STATUS" = "Done" ] || [ "$CURRENT_STATUS" = "Invalid" ]; then
              echo "· #$NUM is $CURRENT_STATUS, skipped"
              continue
            fi

            # Check for other open PRs linking to this issue
            OTHER_PRS=$(gh pr list --repo "$REPO" --state open \
              --json number,body -q \
              "[.[] | select(.number != $PR_NUM) | select(.body | test(\"(?i)(close[sd]?|fix(e[sd])?|resolve[sd]?)\\\\s+#$NUM\"))] | length" 2>/dev/null || echo "0")

            if [ "$OTHER_PRS" -gt 0 ] 2>/dev/null; then
              echo "· #$NUM has $OTHER_PRS other open PR(s), staying In Review"
              continue
            fi

            # No other PRs — decide based on assignment
            ASSIGNEE_COUNT=$(gh issue view "$NUM" \
              --repo "$REPO" --json assignees -q '.assignees | length')

            if [ "$ASSIGNEE_COUNT" -gt 0 ]; then
              TARGET="$STATUS_IN_PROGRESS"
              TARGET_NAME="In Progress"
            else
              TARGET="$STATUS_BACKLOG"
              TARGET_NAME="Backlog"
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$TARGET\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #$NUM → $TARGET_NAME (PR #$PR_NUM closed, assignees: $ASSIGNEE_COUNT)"
          done
